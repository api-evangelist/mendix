apis:
  - aid: mendix:deploy-api
    name: Mendix Deploy API
    description: >-
      REST API for managing apps, environments, deployment packages, transports,
      backups, and deployment lifecycle on Mendix Cloud. Authentication is via
      Mendix-Username and Mendix-ApiKey request headers tied to the requesting
      user's API key and platform permissions.
    humanURL: https://docs.mendix.com/apidocs-mxsdk/apidocs/deploy-api/
    baseURL: https://deploy.mendix.com/api/1
    tags:
      - Low-Code
      - Deployment
      - Application Lifecycle
    properties:
      - type: Documentation
        url: https://docs.mendix.com/apidocs-mxsdk/apidocs/deploy-api/
      - type: Deploy API v2
        url: https://docs.mendix.com/apidocs-mxsdk/apidocs/deploy-api-2/
  - aid: mendix:build-api
    name: Mendix Build API
    description: >-
      REST API for managing app projects, branches, revisions, and build
      packages in Mendix Team Server. Uses Mendix API key authentication.
    humanURL: https://docs.mendix.com/apidocs-mxsdk/apidocs/build-api/
    baseURL: https://deploy.mendix.com/api/1
    tags:
      - Low-Code
      - Build
      - Source Control
    properties:
      - type: Documentation
        url: https://docs.mendix.com/apidocs-mxsdk/apidocs/build-api/
  - aid: mendix:app-repository-api
    name: Mendix App Repository API
    description: >-
      REST API for managing apps, members, and repository metadata in the
      Mendix platform. Uses PAT or Mendix API key authentication.
    humanURL: https://docs.mendix.com/apidocs-mxsdk/apidocs/app-repository-api/
    baseURL: https://repository.api.mendix.com
    tags:
      - Low-Code
      - App Management
      - Governance
    properties:
      - type: Documentation
        url: https://docs.mendix.com/apidocs-mxsdk/apidocs/app-repository-api/
