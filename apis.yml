aid: mendix
name: Mendix
description: >-
  Mendix, a Siemens company, is an enterprise low-code application development
  platform for designing, building, deploying, and operating multi-experience
  applications across web, mobile, and conversational interfaces. The platform
  spans Studio Pro modeling, the Mendix Cloud and private cloud runtimes, and
  governance and operational tooling for the full application lifecycle.
  Mendix exposes a suite of platform APIs (Deploy, Build, App Repository,
  User Management, Content, Studio Pro, and Apps APIs) secured by API keys
  or personal access tokens (PATs).
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Low-Code
  - Application Development
  - Enterprise Platform
  - Application Lifecycle
  - Deployment
  - Governance
